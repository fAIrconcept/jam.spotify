name: Update Spotify Jam

on:
  workflow_dispatch:
    inputs:
      jam_url:
        description: "New Spotify Jam URL"
        required: true
      title:
        description: "Page Title"
        default: "Join My Spotify Jam"
        required: false
      description:
        description: "Meta Description"
        default: "Let's vibe together on Spotify!"
        required: false
      og_image:
        description: "OG Image"
        default: "https://jam.spotify.schachteli.ch/cyberVSsolar.png"
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update with environment variables
        run: |
          export JAM_URL="${{ github.event.inputs.jam_url }}"
          export TITLE="${{ github.event.inputs.title }}"
          export DESCRIPTION="${{ github.event.inputs.description }}"
          export OG_IMAGE="${{ github.event.inputs.og_image }}"
          envsubst < redirect.template.html > index.html

      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add index.html
          git commit -m "Update Jam page"
          git push
          
      - name: Trigger DigitalOcean Deploy
        run: |
          curl -X POST "https://api.digitalocean.com/v2/apps/walrus-app/deployments" \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}"

      - name: Wait for DO Deploy to Finish
        env:
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          DO_APP_ID: walrus-app
        run: |
          echo "Waiting for DigitalOcean deployment to complete..."
          for i in {1..30}; do
            STATUS=$(curl -s -H "Authorization: Bearer $DO_API_TOKEN" \
              https://api.digitalocean.com/v2/apps/$DO_APP_ID/deployments | jq -r '.deployments[0].phase')
      
            echo "Current deployment status: $STATUS"
            if [ "$STATUS" == "ACTIVE" ]; then
              echo "✅ Deployment completed!"
              exit 0
            elif [ "$STATUS" == "ERROR" ]; then
              echo "❌ Deployment failed."
              exit 1
            fi
            sleep 10
          done
      
          echo "❌ Deployment timed out."
          exit 1
