<html>
  <head>
    <title>Join My Spotify Jam</title>
    <meta name="description" content="Let's vibe together on Spotify!" />
    <meta property="og:title" content="Join My Spotify Jam" />
    <meta property="og:description" content="Let's vibe together on Spotify!" />
    <meta property="og:url" content="https://spotify.link/DknEu2WwVSb" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://jam.spotify.schachteli.ch/cyberVSsolar.png" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <link rel="apple-touch-icon" href="/favicon.webp" />
    <script>
      let redirectTimeout = setTimeout(() => {
        window.location.href = "https://spotify.link/JW8tIYDwMSb";
      }, 5000); // Redirect after 5 seconds
    
      function cancelRedirect() {
        clearTimeout(redirectTimeout);
        document.getElementById('cancel-msg').textContent = "✅ Redirect canceled.";
      }
     </script>
  </head>
  <body>
    <h1>🎶 Redirecting You to the Jam...</h1>
    <p>If you're not redirected, <a href="https://spotify.link/DknEu2WwVSb">click here</a>.</p>
    <button onclick="cancelRedirect()">Cancel Redirect</button>
    <p id="cancel-msg"></p>
    <div class="spinner"></div>
    <style>
      body { font-family: sans-serif; text-align: center; margin-top: 100px; }
      .spinner {
        border: 8px solid #f3f3f3;
        border-top: 8px solid #1DB954;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </body>
</html>
